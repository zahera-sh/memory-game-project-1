<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Pro</title>
    <link rel="stylesheet" href="./css/style.css" />
    <script defer src="./js/app.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Acme&family=Bonbon&family=Honk:MORF@15&family=Londrina+Shadow&family=Roboto+Slab:wght@100..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <h1>Memory Pro</h1>

    <h2 id="message">Message</h2>

    <div class="start-screen">
        <div class="start-bubble">
            <div class="start-heading">
                <h1>Memory Pro</h1>
                <p>Please enter your name and press start to play 😊</p>
            </div>
            <div class="start-content">
                <input id="name-input" type="text" placeholder="Enter Your Name">
                <button id="start">Start</button>
            </div>
        </div>
    </div>


    <section class="tools">
        <div class=tool id="moves"></div>
        <div class=tool id="matched"></div>
    </section>

    <br>
    <br>

    <section class="board">
        <div class="crds" id="0"></div>
        <div class="crds" id="1"></div>
        <div class="crds" id="2"></div>
        <div class="crds" id="3"></div>
        <div class="crds" id="4"></div>
        <div class="crds" id="5"></div>
        <div class="crds" id="6"></div>
        <div class="crds" id="7"></div>
        <div class="crds" id="8"></div>
        <div class="crds" id="9"></div>
        <div class="crds" id="10"></div>
        <div class="crds" id="11"></div>
        <div class="crds" id="12"></div>
        <div class="crds" id="13"></div>
        <div class="crds" id="14"></div>
        <div class="crds" id="15"></div>
    </section>

    <br>
    <br>

    <button id="reset">Reset</button>

    <br>
    <br>

</body>

</html>
